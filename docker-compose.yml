name: hackmate

services:
  chat_service:
    container_name: chat-service
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - NODE_ENV=development
      - APP_PORT=3000
      - API_PREFIX=api
      - APP_FALLBACK_LANGUAGE=en
      - APP_HEADER_LANGUAGE=x-custom-lang
      - BACKEND_DOMAIN=http://localhost:3000
      - FRONTEND_DOMAIN=http://localhost:5173
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=chat_db
      - DATABASE_PORT=5432
      - DATABASE_NAME=db
      - DATABASE_USERNAME=hackmate_user
      - DATABASE_PASSWORD=hackmate_password
      - DATABASE_MAX_CONNECTIONS=100
      - DATABASE_SSL_ENABLED=false
      - DATABASE_REJECT_UNAUTHORIZED=false
    depends_on:
      - chat_db

    ports:
      - "3000:3000"

  chat_db:
    image: postgres:18
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackmate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackmate_password}
      POSTGRES_DB: ${POSTGRES_DB:-db}
    volumes:
      - db_chat_data:/var/lib/postgresql

volumes:
  db_chat_data:
    name: hackmate_db_chat_data
